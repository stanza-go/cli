name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4
        with:
          path: cli

      - uses: actions/checkout@v4
        with:
          repository: stanza-go/framework
          path: framework

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: cli/go.sum

      - name: Vet
        working-directory: cli
        run: go vet ./...

      - name: Build
        working-directory: cli
        run: go build -o /dev/null .
